name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check framework tests

      - name: Format check (black)
        run: uv run black --check framework tests

      - name: Type check (mypy)
        run: uv run mypy --config-file mypy.ini framework tests

      - name: Test
        run: uv run pytest
